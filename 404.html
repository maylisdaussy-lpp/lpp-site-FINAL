<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable - Les Petits Papiers</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #faf8f5; min-height: 100vh; display: flex; flex-direction: column; }
    .error-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }
    .error-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .error-content {
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 4rem;
    }
    .error-num {
      font-size: 7rem; font-weight: 700;
      color: #5ACAF1; line-height: 1;
      margin-bottom: .5rem;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem; font-weight: 600;
      color: #1a1a2e; margin-bottom: 1rem;
      line-height: 1.3;
    }
    p { font-size: 16px; color: #7a7a8c; margin-bottom: 2.5rem; line-height: 1.65; }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      background: #EB356F; color: white;
      text-decoration: none; padding: 13px 28px;
      border-radius: 50px; font-size: 15px; font-weight: 600;
      transition: opacity .2s;
    }
    .btn-home:hover { opacity: .85; }
    @media (max-width: 768px) {
      .error-wrap { grid-template-columns: 1fr; }
      .error-img { height: 280px; order: -1; }
      .error-content { padding: 3rem 2rem; }
      .error-num { font-size: 5rem; }
    }
  
    
  
    
  
    
  
    /* LB-START */
    #lbox { display:none; position:fixed; inset:0; z-index:99999;
      background:rgba(0,0,0,.9); align-items:center; justify-content:center; }
    #lbox.on { display:flex; }
    #lbox-img { max-width:90vw; max-height:88vh; border-radius:10px;
      object-fit:contain; display:block; }
    #lbox-x { position:fixed; top:14px; right:14px; width:38px; height:38px;
      border-radius:50%; background:rgba(250,248,245,.82); border:none;
      font-size:20px; line-height:38px; text-align:center; cursor:pointer;
      z-index:100000; padding:0; }
    /* LB-END */
  
    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e8e6e0;
      font-family: 'Outfit', sans-serif;
    }
    .nav-row1 {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 10px 24px 6px;
    }
    .nav-logo-wrap { grid-column: 2; display: flex; justify-content: center; }
    .nav-logo-link { line-height: 0; text-decoration: none; display: block; }
    .nav-logo { height: 42px; width: auto; display: block; }
    .nav-cta-wrap { grid-column: 3; display: flex; justify-content: flex-end; }
    .nav-cta {
      background: #EB356F; color: white !important;
      text-decoration: none; padding: 9px 20px;
      border-radius: 50px; font-size: 13px; font-weight: 500;
      white-space: nowrap; transition: opacity .2s; display: inline-block;
    }
    .nav-cta:hover { opacity: .85; }
    .nav-row2 {
      display: flex; align-items: center; justify-content: center;
      gap: 32px; list-style: none; margin: 0;
      padding: 0 24px 10px;
      border-top: 1px solid rgba(0,0,0,.06);
    }
    .nav-row2 li { list-style: none; margin: 0; padding: 0; }
    .nav-row2 a { text-decoration: none; color: #2d2d3a; font-size: 14px; font-weight: 400; transition: color .2s; }
    .nav-row2 a:hover, .nav-row2 a.active { color: #5ACAF1; }
    @media (max-width: 768px) {
      .nav-row1 { padding: 8px 14px 4px; }
      .nav-logo { height: 36px; }
      .nav-cta { font-size: 12px; padding: 7px 13px; }
      .nav-row2 { gap: 16px; padding: 0 12px 8px; }
      .nav-row2 a { font-size: 13px; }
    }
    @media (max-width: 420px) {
      .nav-row2 { gap: 10px; flex-wrap: wrap; font-size: 12px; }
    }
    /* /NAV */
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-content">
      <p class="error-num">404</p>
      <h1>Oh oh, une erreur s'est produite</h1>
      <p>Reprenez votre navigation où vous en étiez :</p>
      <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="nos-supports.html">Nos supports</a>
        <a href="inspirez-vous.html">Inspirez-vous</a>
        <a href="a-propos-de-nous.html">À propos de nous</a>
        <a href="contact.html">Contact</a>
        <a href="blog.html">Blog</a>
      </nav>
      <a href="index.html" class="btn-home">Retour à l'accueil →</a>
    </div>
    <img src="images/404-image.png" alt="Les Petits Papiers - page introuvable" class="error-img">
  </div>
  <div id="lbox" onclick="if(event.target===this)lbClose()">
    <button id="lbox-x" onclick="lbClose()">✕</button>
    <img id="lbox-img" src="" alt="" onclick="event.stopPropagation()">
  </div>
</body>
</html>
