<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable - Les Petits Papiers</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #faf8f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
    h1 { font-size: 5rem; font-weight: 700; color: #5ACAF1; line-height: 1; margin-bottom: .5rem; }
    h2 { font-size: 1.5rem; font-weight: 600; color: #1a1a2e; margin-bottom: 1rem; }
    p { color: #7a7a8c; margin-bottom: 2rem; font-size: 16px; }
    a { display: inline-flex; align-items: center; gap: 8px; background: #5ACAF1; color: white; text-decoration: none; padding: 13px 28px; border-radius: 50px; font-weight: 600; font-size: 15px; }
    a:hover { opacity: .85; }
  
    /* Max width global */
    .site-content { max-width: 1400px; margin: 0 auto; }
    section, .page-hero, .hero, .story, .valeurs, .engagements, .presse,
    .pour-qui, .supports, .offres, .wall-box, .sector-section, .contact-wrap,
    .blog-grid, .article-wrap, .breadcrumb, .filter-wrap, .tabs-wrap {
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
    }
    .usp-strip, .cta-section, footer, nav > * { max-width: 1400px; margin-left: auto; margin-right: auto; }
    nav { display: flex; justify-content: center; }
    nav > a, nav > ul { flex-shrink: 0; }
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e8e6e0;
    }
    .nav-top {
      display: flex; align-items: center; justify-content: center;
      padding: .85rem 2rem .5rem;
      position: relative;
    }
    .nav-logo-link { line-height: 0; text-decoration: none; }
    .nav-logo { height: 44px; display: block; }
    .nav-cta-top {
      position: absolute; right: 2rem; top: 50%;
      transform: translateY(-50%);
      background: #EB356F; color: white;
      text-decoration: none; padding: 9px 22px;
      border-radius: 50px; font-weight: 500; font-size: 14px;
      white-space: nowrap; transition: opacity .2s;
      font-family: 'Outfit', sans-serif;
    }
    .nav-cta-top:hover { opacity: .85; }
    .nav-bottom {
      display: flex; align-items: center; justify-content: center;
      gap: 2rem;
      list-style: none !important;
      padding: 0 2rem .65rem;
      border-top: 1px solid rgba(0,0,0,.04);
      margin: 0;
    }
    .nav-bottom li { list-style: none !important; padding: 0; margin: 0; }
    .nav-bottom li::before { display: none !important; }
    .nav-bottom a {
      text-decoration: none; color: #2d2d3a;
      font-size: 14px; font-weight: 400;
      transition: color .2s;
    }
    .nav-bottom a:hover, .nav-bottom a.active { color: #5ACAF1; }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <h2>Cette page n'existe pas</h2>
    <p>Le lien est peut-être cassé, ou la page a été déplacée.</p>
    <a href="/">Retour à l'accueil →</a>
  </div>
</body>
</html>
