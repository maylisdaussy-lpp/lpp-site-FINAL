  <script>
    // Redirections 301-like via JavaScript pour les anciennes URLs Shopify
    (function() {
      var path = window.location.pathname + window.location.search;
      var redirects = [
        // Anciennes URLs produits Shopify (avec ou sans .json)
        { pattern: /^\/products\/.*/i, target: '/nos-supports/' },
        // Anciennes URLs blog Shopify
        { pattern: /^\/blogs\/leblogdespetitspapiers/i, target: '/blog/' },
        { pattern: /^\/blogs\/.*/i, target: '/blog/' },
        // Anciennes pages statiques
        { pattern: /^\/pages\/contact/i, target: '/contact/' },
        { pattern: /^\/pages\/le-coin-des-pros/i, target: '/nos-supports/' },
        { pattern: /^\/pages\/.*/i, target: '/' },
        // Anciennes collections
        { pattern: /^\/collections\/enfants/i, target: '/particuliers/' },
        { pattern: /^\/collections\/.*/i, target: '/nos-supports/' },
        // .html en double sur les pages migrées
        { pattern: /^\/a-propos-de-nous\.html$/i, target: '/a-propos-de-nous/' },
        { pattern: /^\/contact\.html$/i, target: '/contact/' },
        { pattern: /^\/nos-supports\.html$/i, target: '/nos-supports/' },
        { pattern: /^\/inspirez-vous\.html$/i, target: '/inspirez-vous/' },
        { pattern: /^\/blog\.html$/i, target: '/blog/' },
        // URLs sans trailing slash (au cas où)
        { pattern: /^\/(nos-supports|inspirez-vous|contact|a-propos-de-nous|blog|particuliers|la-vignette|le-grand-format|le-panorama)$/i, target: function(m) { return '/' + m[1] + '/'; } }
      ];
      for (var i = 0; i < redirects.length; i++) {
        var r = redirects[i];
        var match = path.match(r.pattern);
        if (match) {
          var target = typeof r.target === 'function' ? r.target(match) : r.target;
          window.location.replace(target);
          return;
        }
      }
    })();
  </script>
