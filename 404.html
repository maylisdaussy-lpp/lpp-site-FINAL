<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable - Les Petits Papiers</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #faf8f5; min-height: 100vh; display: flex; flex-direction: column; }
    .error-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }
    .error-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .error-content {
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 4rem;
    }
    .error-num {
      font-size: 7rem; font-weight: 700;
      color: #5ACAF1; line-height: 1;
      margin-bottom: .5rem;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem; font-weight: 600;
      color: #1a1a2e; margin-bottom: 1rem;
      line-height: 1.3;
    }
    p { font-size: 16px; color: #7a7a8c; margin-bottom: 2.5rem; line-height: 1.65; }
    .nav-links a:hover { color: #5ACAF1; }
    .nav-links a::before { content: '→'; color: #5ACAF1; }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      background: #EB356F; color: white;
      text-decoration: none; padding: 13px 28px;
      border-radius: 50px; font-size: 15px; font-weight: 600;
      transition: opacity .2s;
    }
    .btn-home:hover { opacity: .85; }
    @media (max-width: 768px) {
      .error-wrap { grid-template-columns: 1fr; }
      .error-img { height: 280px; order: -1; }
      .error-content { padding: 3rem 2rem; }
      .error-num { font-size: 5rem; }
    }
  
    
  
    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #e8e6e0;
    }
    .nav-top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: .75rem 2rem .4rem;
    }
    .nav-logo-link { display: block; line-height: 0; text-decoration: none; }
    .nav-logo { height: 42px; width: auto; display: block; }
    .nav-logo-center { display: flex; justify-content: center; }
    .nav-cta-right { display: flex; justify-content: flex-end; }
    .nav-cta-top {
      background: #EB356F; color: white !important;
      text-decoration: none; padding: 9px 22px;
      border-radius: 50px; font-weight: 500; font-size: 13px;
      font-family: 'Outfit', sans-serif; white-space: nowrap;
      transition: opacity .2s; display: inline-block;
    }
    .nav-cta-top:hover { opacity: .85; }
    .nav-bottom {
      display: flex; align-items: center; justify-content: center;
      gap: 2rem; list-style: none !important;
      padding: 0 2rem .6rem; margin: 0;
      border-top: 1px solid rgba(0,0,0,.05);
    }
    .nav-bottom li { list-style: none !important; padding: 0; margin: 0; }
    .nav-bottom li::before, .nav-bottom li::marker { display: none !important; content: '' !important; }
    .nav-bottom a { text-decoration: none; color: #2d2d3a; font-size: 14px; font-weight: 400; transition: color .2s; }
    .nav-bottom a:hover, .nav-bottom a.active { color: #5ACAF1; }
    @media (max-width: 768px) {
      .nav-top { grid-template-columns: 1fr auto 1fr; padding: .6rem 1rem .3rem; }
      .nav-cta-top { font-size: 12px; padding: 7px 14px; }
      .nav-bottom { gap: 1rem; font-size: 13px; }
    }
    @media (max-width: 480px) {
      .nav-bottom { gap: .6rem; flex-wrap: wrap; font-size: 12px; padding: 0 .75rem .5rem; }
    }
    /* FIN NAV */
  </style>
</head>
<body>
  <div class="error-wrap">
    <div class="error-content">
      <p class="error-num">404</p>
      <h1>Oh oh, une erreur s'est produite</h1>
      <p>Reprenez votre navigation où vous en étiez :</p>
      <nav class="nav-links">
        <a href="index.html">Accueil</a>
        <a href="nos-supports.html">Nos supports</a>
        <a href="inspirez-vous.html">Inspirez-vous</a>
        <a href="a-propos-de-nous.html">À propos de nous</a>
        <a href="contact.html">Contact</a>
        <a href="blog.html">Blog</a>
      </nav>
      <a href="index.html" class="btn-home">Retour à l'accueil →</a>
    </div>
    <img src="images/404-image.png" alt="Les Petits Papiers - page introuvable" class="error-img">
  </div>
</body>
</html>
