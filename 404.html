  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Outfit', sans-serif; background: #faf8f5; min-height: 100vh; display: flex; flex-direction: column; }
    .error-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }
    .error-img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .error-content {
      display: flex; flex-direction: column;
      justify-content: center; align-items: flex-start;
      padding: 4rem;
    }
    .error-num {
      font-size: 7rem; font-weight: 700;
      color: #5ACAF1; line-height: 1;
      margin-bottom: .5rem;
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem; font-weight: 600;
      color: #1a1a2e; margin-bottom: 1rem;
      line-height: 1.3;
    }
    p { font-size: 16px; color: #7a7a8c; margin-bottom: 2.5rem; line-height: 1.65; }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      background: #EB356F; color: white;
      text-decoration: none; padding: 13px 28px;
      border-radius: 50px; font-size: 15px; font-weight: 600;
      transition: opacity .2s;
    }
    .btn-home:hover { opacity: .85; }
    @media (max-width: 768px) {
      .error-wrap { grid-template-columns: 1fr; }
      .error-img { height: 280px; order: -1; }
      .error-content { padding: 3rem 2rem; }
      .error-num { font-size: 5rem; }
    }
  
    
  
    
  
    
  
    /* LB-START */
    #lbox { display:none; position:fixed; inset:0; z-index:99999;
      background:rgba(0,0,0,.9); align-items:center; justify-content:center; }
    #lbox.on { display:flex; }
    #lbox-img { max-width:90vw; max-height:88vh; border-radius:10px;
      object-fit:contain; display:block; }
    #lbox-x { position:fixed; top:14px; right:14px; width:38px; height:38px;
      border-radius:50%; background:rgba(250,248,245,.82); border:none;
      font-size:20px; line-height:38px; text-align:center; cursor:pointer;
      z-index:100000; padding:0; }
    /* LB-END */
  
    
  
    
  
    
  
  
    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(255,255,255,.97);backdrop-filter:blur(10px);border-bottom:1px solid #e8e6e0;font-family:'Outfit',sans-serif}
    .nav-top{display:flex;align-items:center;padding:18px 24px 8px;min-height:66px}
    .nav-top-spacer{flex:1}
    .nav-top-logo a{line-height:0;text-decoration:none;display:block}
    .nav-top-logo img{height:42px;width:auto;display:block}
    .nav-top-cta{flex:1;display:flex;justify-content:flex-end}
    .nav-top-cta a{background:#EB356F;color:white;text-decoration:none;padding:9px 20px;border-radius:50px;font-size:13px;font-weight:500;white-space:nowrap;transition:opacity .2s}
    .nav-top-cta a:hover{opacity:.85}
    .nav-menu{display:flex;align-items:center;justify-content:center;gap:32px;list-style:none;padding:8px 24px 14px;margin:0;border-top:1px solid rgba(0,0,0,.06)}
    .nav-menu li{list-style:none}
    .nav-menu a{text-decoration:none;color:#2d2d3a;font-size:14px;font-weight:400;transition:color .2s}
    .nav-menu a:hover,.nav-menu a.active{color:#5ACAF1}
    /* Burger */
    .nav-burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px;background:none;border:none;flex-shrink:0}
    .nav-burger span{display:block;width:24px;height:2px;background:#2d2d3a;border-radius:2px;transition:all .3s}
    .nav-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
    .nav-burger.open span:nth-child(2){opacity:0}
    .nav-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
    /* Mobile menu panel */
    .nav-mobile-panel{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:9998;flex-direction:column;padding:100px 2rem 2rem;gap:0}
    .nav-mobile-panel.open{display:flex}
    .nav-mobile-panel a{text-decoration:none;color:#2d2d3a;font-size:18px;font-weight:500;padding:1rem 0;border-bottom:1px solid #e8e6e0;display:block;transition:color .2s}
    .nav-mobile-panel a:hover{color:#5ACAF1}
    .nav-mobile-cta{margin-top:auto;padding-top:2rem}
    .nav-mobile-cta a{display:block;text-align:center;background:#EB356F;color:white;text-decoration:none;padding:15px;border-radius:50px;font-size:16px;font-weight:600}
    @media(max-width:768px){
      .nav-top-cta{display:none}
      .nav-menu{display:none}
      .nav-burger{display:flex}
      .nav-top{padding:14px 20px}
      .nav-top-logo img{height:36px}
    }
    /* /NAV */

    #mlb2-42332261 .ml-button-horizontal button.primary{padding:9px 16px!important;border-radius:50px!important;border:none!important;background:white!important;color:#EB356F!important;font-size:13px!important;font-weight:600!important;cursor:pointer!important;font-family:'Outfit',sans-serif!important;white-space:nowrap}
